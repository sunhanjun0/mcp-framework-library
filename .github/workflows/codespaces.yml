name: Codespaces Configuration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-devcontainer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate devcontainer.json
        uses: devcontainers/ci@v0.3
        with:
          push: never
          imageName: mcp-framework-library-codespaces
          cacheFrom: mcp-framework-library-codespaces

  test-in-codespaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Initialize database
        run: npm run init-db

      - name: Run tests
        run: npm test
