version: '3.8'

services:
  mcp-framework:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-framework-library
    restart: unless-stopped
    volumes:
      # 持久化数据库
      - ./data:/app/data
      # 持久化日志（可选）
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      # 如需自定义配置，可添加环境变量
      # - MCP_PORT=3000
    ports:
      - "3000:3000"
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('OK')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # 可选：添加 Redis 缓存服务
  # redis:
  #   image: redis:7-alpine
  #   container_name: mcp-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - mcp-network
  #   ports:
  #     - "6379:6379"

networks:
  mcp-network:
    driver: bridge

